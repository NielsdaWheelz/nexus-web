# Docker Compose for local development app data services.
# Supabase local is still used separately for Auth only.

name: nexus-local

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-54320}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --address ":9000"
    environment:
      MINIO_ROOT_USER: ${R2_ACCESS_KEY_ID:-nexus-local-access-key}
      MINIO_ROOT_PASSWORD: ${R2_SECRET_ACCESS_KEY:-nexus-local-secret-key}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "${MINIO_PORT:-9000}:9000"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    environment:
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-nexus-local-access-key}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-nexus-local-secret-key}
      R2_BUCKET: ${R2_BUCKET:-media}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 \"$${R2_ACCESS_KEY_ID}\" \"$${R2_SECRET_ACCESS_KEY}\"; do sleep 1; done &&
      mc mb --ignore-existing \"local/$${R2_BUCKET}\"
      "

volumes:
  postgres-data:
  minio-data:
