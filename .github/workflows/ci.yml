name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          cd python
          uv sync --all-extras

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install node ingest dependencies
        run: |
          cd node/ingest
          bun install --frozen-lockfile

      - name: Lint
        run: |
          cd python
          uv run ruff check .

      - name: Run tests
        run: |
          make test-back

  test-migrations:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          cd python
          uv sync --all-extras

      - name: Run migration tests
        run: |
          make test-migrations

  lint-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd apps/web
          bun install --frozen-lockfile

      - name: Lint
        run: |
          cd apps/web
          bun run lint

      - name: Type check
        run: |
          cd apps/web
          bun run typecheck

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd apps/web
          bun install --frozen-lockfile

      - name: Install Playwright browsers for Vitest Browser Mode
        run: |
          cd apps/web
          bunx playwright install --with-deps chromium

      - name: Run tests
        run: |
          cd apps/web
          bun run test

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test, test-migrations, lint-frontend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Install E2E dependencies
        run: |
          cd e2e
          bun install --frozen-lockfile
          bunx playwright install --with-deps chromium

      - name: Install backend dependencies
        run: |
          cd python
          uv sync --all-extras

      - name: Install frontend dependencies
        run: |
          cd apps/web
          bun install --frozen-lockfile

      - name: Run E2E tests
        run: |
          make test-e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 14
