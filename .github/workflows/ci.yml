name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Run static checks
        run: PATH="$(go env GOPATH)/bin:$PATH" make check

  test-provider-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: static-checks
    env:
      LLM_CALLING_DIR: llm-calling

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve provider-runtime revision
        id: provider-runtime
        run: |
          rev="$(sed -n 's/^provider-runtime.*rev = "\([0-9a-f]*\)".*/\1/p' python/pyproject.toml)"
          if [ -z "$rev" ]; then
            echo "::error title=Missing provider-runtime pin::python/pyproject.toml does not pin provider-runtime by git rev."
            exit 1
          fi
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Check out provider-runtime
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NielsdaWheelz/llm-calling
          ref: ${{ steps.provider-runtime.outputs.rev }}
          path: llm-calling
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: llm-calling/uv.lock

      - name: Test pinned provider-runtime
        run: make test-provider-runtime

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Audit dependencies
        run: make audit

  test-back-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: static-checks

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Test backend unit
        run: make test-back-unit

  test-back-db:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: static-checks

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-node-ingest-${{ hashFiles('node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-node-ingest-

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Test backend DB tiers
        run: ./scripts/with_test_services.sh make _test-back-db-ready _test-back-integration-raw _test-migrations-raw

  test-front:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: static-checks

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(cd apps/web && node -p 'require("playwright/package.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Test frontend unit
        run: make test-front-unit

      - name: Test frontend browser
        run: make test-front-browser

  build-front:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static-checks

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/bun.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-next-${{ hashFiles('apps/web/bun.lock') }}-

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Build frontend and gate First Load JS budget
        run: make check-bundle

  test-android:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: static-checks
    env:
      NEXUS_GOOGLE_WEB_CLIENT_ID: ${{ vars.NEXUS_GOOGLE_WEB_CLIENT_ID || 'ci-placeholder.apps.googleusercontent.com' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-android-${{ hashFiles('apps/android/**/*.gradle*', 'apps/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-android-

      - name: Verify Android shell
        run: make verify-android

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    needs:
      - test-back-unit
      - test-back-db
      - test-front

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-e2e-${{ hashFiles('apps/web/bun.lock', 'e2e/bun.lock', 'node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-e2e-

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: 2.90.0

      - name: Install backend dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Install E2E dependencies
        run: cd e2e && bun ci

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Test E2E shard ${{ matrix.shard }}
        run: make test-e2e PLAYWRIGHT_ARGS="--shard=${{ matrix.shard }}/2"

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-test-results-shard-${{ matrix.shard }}
          path: e2e/test-results/
          retention-days: 14

  test-e2e-csp:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - test-back-unit
      - test-back-db
      - test-front

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-e2e-${{ hashFiles('apps/web/bun.lock', 'e2e/bun.lock', 'node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-e2e-

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: 2.90.0

      - name: Install backend dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Install E2E dependencies
        run: cd e2e && bun ci

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Test strict CSP profile
        run: make test-csp

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report-csp
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-test-results-csp
          path: e2e/test-results/
          retention-days: 14

  test-real-media:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - test-back-unit
      - test-back-db
      - test-front
      - build-front

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-real-media-${{ hashFiles('apps/web/bun.lock', 'e2e/bun.lock', 'node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-real-media-

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: 2.90.0

      - name: Install backend dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Install E2E dependencies
        run: cd e2e && bun ci

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Test real-media gates
        run: make test-real-media

      - name: Upload backend real-media traces
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: real-media-backend-traces
          path: test-results/real-media-backend/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload real-media Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: real-media-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload real-media Playwright test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: real-media-playwright-test-results
          path: e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14

  test-live-providers:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test-real-media
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
      CLOUDFLARE_AI_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_AI_ACCOUNT_ID }}
      PODCAST_INDEX_API_KEY: ${{ secrets.PODCAST_INDEX_API_KEY }}
      PODCAST_INDEX_API_SECRET: ${{ secrets.PODCAST_INDEX_API_SECRET }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
      X_API_BEARER_TOKEN: ${{ secrets.X_API_BEARER_TOKEN }}
      X_LIVE_TEST_POST_URL: ${{ secrets.X_LIVE_TEST_POST_URL }}
      X_LIVE_TEST_EXPECTED_TEXT: ${{ secrets.X_LIVE_TEST_EXPECTED_TEXT }}
      LLM_CALLING_DIR: llm-calling

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Resolve provider-runtime revision
        id: provider-runtime
        run: |
          rev="$(sed -n 's/^provider-runtime.*rev = "\([0-9a-f]*\)".*/\1/p' python/pyproject.toml)"
          if [ -z "$rev" ]; then
            echo "::error title=Missing provider-runtime pin::python/pyproject.toml does not pin provider-runtime by git rev."
            exit 1
          fi
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Check out provider-runtime
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: NielsdaWheelz/llm-calling
          ref: ${{ steps.provider-runtime.outputs.rev }}
          path: llm-calling
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-live-providers-${{ hashFiles('node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-live-providers-

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: 2.90.0

      - name: Install backend dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Check live-provider secrets
        id: live-provider-secrets
        run: |
          missing=()
          for name in \
            OPENAI_API_KEY \
            ANTHROPIC_API_KEY \
            GEMINI_API_KEY \
            OPENROUTER_API_KEY \
            CLOUDFLARE_AI_API_TOKEN \
            CLOUDFLARE_AI_ACCOUNT_ID \
            PODCAST_INDEX_API_KEY \
            PODCAST_INDEX_API_SECRET \
            DEEPGRAM_API_KEY \
            YOUTUBE_DATA_API_KEY \
            X_API_BEARER_TOKEN \
            X_LIVE_TEST_POST_URL \
            X_LIVE_TEST_EXPECTED_TEXT
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -ne 0 ]; then
            missing_names="$(IFS=,; echo "${missing[*]}")"
            {
              echo "live_ready=false"
              echo "missing_count=${#missing[@]}"
              echo "missing_names=$missing_names"
            } >> "$GITHUB_OUTPUT"
            echo "::notice title=Live-provider gate not run::Missing required repository secrets: $missing_names. This CI run is not live-provider proof."
            exit 0
          fi
          echo "live_ready=true" >> "$GITHUB_OUTPUT"

      - name: Test live-provider gate
        if: steps.live-provider-secrets.outputs.live_ready == 'true'
        run: make test-live-providers

      - name: Upload live-provider traces
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure() && steps.live-provider-secrets.outputs.live_ready == 'true'
        with:
          name: live-provider-traces
          path: test-results/live-providers/
          if-no-files-found: ignore
          retention-days: 14
