name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: web-search-tool-token
        with:
          client-id: ${{ vars.WEB_SEARCH_TOOL_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEB_SEARCH_TOOL_GITHUB_APP_PRIVATE_KEY }}
          owner: NielsdaWheelz
          repositories: web-search-tool, llm-calling
          permission-contents: read

      - name: Configure private Git dependency access
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/NielsdaWheelz/".insteadOf "https://github.com/NielsdaWheelz/"
        env:
          TOKEN: ${{ steps.web-search-tool-token.outputs.token }}

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Run static checks
        run: PATH="$(go env GOPATH)/bin:$PATH" make check

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: web-search-tool-token
        with:
          client-id: ${{ vars.WEB_SEARCH_TOOL_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEB_SEARCH_TOOL_GITHUB_APP_PRIVATE_KEY }}
          owner: NielsdaWheelz
          repositories: web-search-tool, llm-calling
          permission-contents: read

      - name: Configure private Git dependency access
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/NielsdaWheelz/".insteadOf "https://github.com/NielsdaWheelz/"
        env:
          TOKEN: ${{ steps.web-search-tool-token.outputs.token }}

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Audit dependencies
        run: make audit

  test-back-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: static-checks

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: web-search-tool-token
        with:
          client-id: ${{ vars.WEB_SEARCH_TOOL_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEB_SEARCH_TOOL_GITHUB_APP_PRIVATE_KEY }}
          owner: NielsdaWheelz
          repositories: web-search-tool, llm-calling
          permission-contents: read

      - name: Configure private Git dependency access
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/NielsdaWheelz/".insteadOf "https://github.com/NielsdaWheelz/"
        env:
          TOKEN: ${{ steps.web-search-tool-token.outputs.token }}

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Test backend unit
        run: make test-back-unit

  test-back-db:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: static-checks

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-node-ingest-${{ hashFiles('node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-node-ingest-

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: web-search-tool-token
        with:
          client-id: ${{ vars.WEB_SEARCH_TOOL_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEB_SEARCH_TOOL_GITHUB_APP_PRIVATE_KEY }}
          owner: NielsdaWheelz
          repositories: web-search-tool, llm-calling
          permission-contents: read

      - name: Configure private Git dependency access
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/NielsdaWheelz/".insteadOf "https://github.com/NielsdaWheelz/"
        env:
          TOKEN: ${{ steps.web-search-tool-token.outputs.token }}

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Test backend DB tiers
        run: ./scripts/with_test_services.sh make _test-back-db-ready _test-back-integration-raw _test-migrations-raw

  test-front:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: static-checks

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Test frontend unit
        run: make test-front-unit

      - name: Test frontend browser
        run: make test-front-browser

  build-front:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: static-checks

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/bun.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-next-${{ hashFiles('apps/web/bun.lock') }}-

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Build frontend
        run: make build

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    needs:
      - test-back-unit
      - test-back-db
      - test-front

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-e2e-${{ hashFiles('apps/web/bun.lock', 'e2e/bun.lock', 'node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-e2e-

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: 2.90.0

      - name: Start Supabase
        run: supabase start

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: web-search-tool-token
        with:
          client-id: ${{ vars.WEB_SEARCH_TOOL_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.WEB_SEARCH_TOOL_GITHUB_APP_PRIVATE_KEY }}
          owner: NielsdaWheelz
          repositories: web-search-tool, llm-calling
          permission-contents: read

      - name: Configure private Git dependency access
        run: git config --global url."https://x-access-token:${TOKEN}@github.com/NielsdaWheelz/".insteadOf "https://github.com/NielsdaWheelz/"
        env:
          TOKEN: ${{ steps.web-search-tool-token.outputs.token }}

      - name: Install backend dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Install E2E dependencies
        run: cd e2e && bun ci

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Test E2E shard ${{ matrix.shard }}
        run: make test-e2e PLAYWRIGHT_ARGS="--shard=${{ matrix.shard }}/2"

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-test-results-shard-${{ matrix.shard }}
          path: e2e/test-results/
          retention-days: 14
