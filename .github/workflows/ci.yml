name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-back:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Check backend
        run: make check-back

  test-back-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Test backend unit
        run: make test-back-unit

  test-back-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-node-ingest-${{ hashFiles('node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-node-ingest-

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Test backend integration
        run: make test-back-integration

  test-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - name: Install Python dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Test migrations
        run: make test-migrations

  check-front:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Check frontend
        run: make check-front

  test-front-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Test frontend unit
        run: make test-front-unit

  test-front-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Test frontend browser
        run: make test-front-browser

  build-front:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-web-${{ hashFiles('apps/web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-web-

      - uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/bun.lock') }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-next-${{ hashFiles('apps/web/bun.lock') }}-

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Build frontend
        run: make build

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - check-back
      - test-back-unit
      - test-back-integration
      - test-migrations
      - check-front
      - test-front-unit
      - test-front-browser
      - build-front

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: python/uv.lock

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-e2e-${{ hashFiles('apps/web/bun.lock', 'e2e/bun.lock', 'node/ingest/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-e2e-

      - uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Start Supabase
        run: supabase start

      - name: Install backend dependencies
        run: cd python && uv sync --all-extras --locked

      - name: Install frontend dependencies
        run: cd apps/web && bun ci

      - name: Install E2E dependencies
        run: cd e2e && bun ci

      - name: Install node ingest dependencies
        run: cd node/ingest && bun ci

      - name: Test E2E
        run: make test-e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 14
