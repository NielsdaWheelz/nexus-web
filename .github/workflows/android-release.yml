name: Android APK Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing android-v* git tag to build and publish.
        required: true
        type: string
      publish_stable:
        description: Publish the verified draft as the latest stable release.
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: android-release

    env:
      ANDROID_RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      NEXUS_ANDROID_RELEASE_BASE_URL: ${{ vars.NEXUS_ANDROID_RELEASE_BASE_URL }}
      NEXUS_ANDROID_RELEASE_OWNED_HOST: ${{ vars.NEXUS_ANDROID_RELEASE_OWNED_HOST }}
      NEXUS_ANDROID_RELEASE_CERT_SHA256: ${{ secrets.NEXUS_ANDROID_RELEASE_CERT_SHA256 }}
      NEXUS_ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.NEXUS_ANDROID_RELEASE_KEY_ALIAS }}
      NEXUS_ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.NEXUS_ANDROID_RELEASE_KEY_PASSWORD }}
      NEXUS_ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.NEXUS_ANDROID_RELEASE_STORE_PASSWORD }}
      NEXUS_GOOGLE_WEB_CLIENT_ID: ${{ vars.NEXUS_GOOGLE_WEB_CLIENT_ID }}
      NEXUS_ANDROID_VERSION_CODE: ${{ github.run_number }}
      NEXUS_ANDROID_VERSION_NAME: ${{ inputs.tag || github.ref_name }}
      ANDROID_PUBLISH_STABLE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_stable || false }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag
        run: |
          set -euo pipefail
          if [[ ! "$ANDROID_RELEASE_TAG" == android-v* ]]; then
            echo "Android releases must use an android-v* git tag."
            exit 1
          fi
          tag_commit="$(git rev-parse "$ANDROID_RELEASE_TAG^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [ "$tag_commit" != "$head_commit" ]; then
            echo "Checked-out commit does not match $ANDROID_RELEASE_TAG."
            exit 1
          fi

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode release keystore
        env:
          NEXUS_ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.NEXUS_ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$NEXUS_ANDROID_RELEASE_KEYSTORE_BASE64"
          printf '%s' "$NEXUS_ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/nexus-release.jks"

      - name: Build and verify signed APK
        env:
          NEXUS_ANDROID_RELEASE_STORE_FILE: ${{ runner.temp }}/nexus-release.jks
        run: make verify-android-release

      - name: Prepare release assets
        run: |
          set -euo pipefail
          android_version="${ANDROID_RELEASE_TAG#android-}"
          cp apps/android/app/build/outputs/apk/release/app-release.apk nexus-android.apk
          cp nexus-android.apk "nexus-android-$android_version.apk"
          shasum -a 256 nexus-android.apk > nexus-android.apk.sha256
          shasum -a 256 "nexus-android-$android_version.apk" > "nexus-android-$android_version.apk.sha256"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          upload_args=()
          if gh release view "$ANDROID_RELEASE_TAG" >/dev/null 2>&1; then
            if [ "$(gh release view "$ANDROID_RELEASE_TAG" --json isDraft --jq .isDraft)" = "true" ]; then
              upload_args+=(--clobber)
            fi
          else
            gh release create "$ANDROID_RELEASE_TAG" \
              --verify-tag \
              --draft \
              --title "$ANDROID_RELEASE_TAG" \
              --notes "Self-distributed Nexus Android APK. Publish only after installing this APK on a device and verifying App Links for app.nexus.android. After publishing, the stable install URL is /releases/latest/download/nexus-android.apk."
          fi
          android_version="${ANDROID_RELEASE_TAG#android-}"
          gh release upload "$ANDROID_RELEASE_TAG" \
            nexus-android.apk \
            nexus-android.apk.sha256 \
            "nexus-android-$android_version.apk" \
            "nexus-android-$android_version.apk.sha256" \
            "${upload_args[@]}"

      - name: Publish stable release
        if: ${{ env.ANDROID_PUBLISH_STABLE == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$(gh release view "$ANDROID_RELEASE_TAG" --json isDraft --jq .isDraft)" != "true" ]; then
            echo "Only draft Android releases can be published by this workflow."
            exit 1
          fi
          release_id="$(gh release view "$ANDROID_RELEASE_TAG" --json databaseId --jq .databaseId)"
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -F draft=false \
            -F prerelease=false \
            -f make_latest=true
