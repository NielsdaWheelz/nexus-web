#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - fail2ban
  - git
  - gnupg
  - lsb-release
  - rsync
  - ufw

write_files:
  - path: /etc/ssh/sshd_config.d/99-nexus-hardening.conf
    owner: root:root
    permissions: "0644"
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      PermitRootLogin no
      X11Forwarding no
      AllowUsers nexus

users:
  - default
  - name: nexus
    gecos: Nexus deploy user
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    ssh_authorized_keys:
      - __NEXUS_SSH_PUBLIC_KEY__

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - sh -c '. /etc/os-release && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker nexus
  - install -d -o nexus -g nexus -m 0755 /opt/nexus-web
  - install -d -o root -g nexus -m 0750 /etc/nexus
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - sshd -t
  - systemctl reload ssh || systemctl reload ssh.socket || systemctl restart ssh
  - systemctl enable --now docker
