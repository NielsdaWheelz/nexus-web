name: nexus

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ${NEXUS_ENV_FILE:-/etc/nexus/nexus.env}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ${NEXUS_ENV_FILE:-/etc/nexus/nexus.env}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ${NEXUS_ENV_FILE:-/etc/nexus/nexus.env}
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging

volumes:
  caddy_data:
  caddy_config:
